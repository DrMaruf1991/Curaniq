# CURANIQ — Local development stack with Postgres
# Usage:
#   1. Copy .env.example to .env and set POSTGRES_PASSWORD to a strong dev password
#   2. docker compose up -d
#   3. alembic upgrade head
#
# Production uses managed Postgres (RDS, Cloud SQL, Yandex DB, etc.), NOT this file.

services:
  postgres:
    image: postgres:16-alpine
    container_name: curaniq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-curaniq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-curaniq}
    ports:
      - "5432:5432"
    volumes:
      - curaniq_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-curaniq} -d ${POSTGRES_DB:-curaniq}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  curaniq_pg_data: